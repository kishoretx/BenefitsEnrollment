<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>
</head>
<body>
    <div th:replace="~{layout :: layout ('Edit Employee', ~{::main})}">
        <main>
            <h1>Edit Employee</h1>
            
            <form th:action="@{/ui/employees/{id}(id=${employee.id})}" th:object="${employee}" method="post">
                
                <div class="form-group">
                    <label>ID</label>
                    <input type="text" th:value="${employee.id}" disabled>
                </div>
                
                <div class="form-group">
                    <label for="name">Name *</label>
                    <input type="text" id="name" th:field="*{name}" required>
                    <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                </div>
                
                <div class="form-group">
                    <label for="status">Status *</label>
                    <select id="status" th:field="*{status}" required>
                        <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Employee</button>
                    <a th:href="@{/ui/employees}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
