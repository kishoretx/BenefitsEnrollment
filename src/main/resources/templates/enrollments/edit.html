<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Enrollment</title>
</head>
<body>
    <div th:replace="~{layout :: layout ('Edit Enrollment', ~{::main})}">
        <main>
            <h1>Edit Enrollment</h1>
            
            <form th:action="@{/ui/enrollments/{id}(id=${enrollment.id})}" th:object="${enrollment}" method="post">
                
                <div class="form-group">
                    <label>ID</label>
                    <input type="text" th:value="${enrollment.id}" disabled>
                </div>
                
                <div class="form-group">
                    <label for="employeeId">Employee *</label>
                    <select id="employeeId" th:field="*{employeeId}" required>
                        <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('employeeId')}" th:errors="*{employeeId}"></span>
                </div>
                
                <div class="form-group">
                    <label for="planId">Plan *</label>
                    <select id="planId" th:field="*{planId}" required>
                        <option th:each="p : ${plans}" th:value="${p.id}" th:text="${p.name}"></option>
                    </select>
                    <span class="error" th:if="${#fields.hasErrors('planId')}" th:errors="*{planId}"></span>
                </div>
                
                <div class="form-group">
                    <label for="enrollmentDate">Enrollment Date *</label>
                    <input type="date" id="enrollmentDate" th:field="*{enrollmentDate}" required>
                    <span class="error" th:if="${#fields.hasErrors('enrollmentDate')}" th:errors="*{enrollmentDate}"></span>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Update Enrollment</button>
                    <a th:href="@{/ui/enrollments}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </main>
    </div>
</body>
</html>
