<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Enrollments</title>
</head>
<body>
    <div th:replace="~{layout :: layout ('Enrollments', ~{::main})}">
        <main>
            <h1>Enrollments</h1>
            
            <div class="actions">
                <a th:href="@{/ui/enrollments/new}" class="btn btn-primary">+ Add Enrollment</a>
            </div>
            
            <form class="filters" method="get" th:action="@{/ui/enrollments}">
                <div class="filter-group">
                    <label>Employee</label>
                    <select name="employeeId">
                        <option value="">All Employees</option>
                        <option th:each="e : ${employees}" th:value="${e.id}" th:text="${e.name}" th:selected="${e.id == employeeIdFilter}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Plan</label>
                    <select name="planId">
                        <option value="">All Plans</option>
                        <option th:each="p : ${plans}" th:value="${p.id}" th:text="${p.name}" th:selected="${p.id == planIdFilter}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <button type="submit" class="btn btn-secondary">Filter</button>
                    <a th:href="@{/ui/enrollments}" class="btn btn-secondary">Clear</a>
                </div>
            </form>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Employee</th>
                        <th>Plan</th>
                        <th>Enrollment Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="enrollment : ${enrollments}" th:if="${#lists.isEmpty(enrollments)} == false">
                        <td th:text="${enrollment.id}">1</td>
                        <td th:text="${enrollment.employeeId}">1</td>
                        <td th:text="${enrollment.planId}">1</td>
                        <td th:text="${enrollment.enrollmentDate}">2024-01-01</td>
                        <td>
                            <a th:href="@{/ui/enrollments/{id}/edit(id=${enrollment.id})}" class="btn btn-secondary" style="padding: 6px 12px;">Edit</a>
                            <form th:action="@{/ui/enrollments/{id}/delete(id=${enrollment.id})}" method="post" style="display: inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this enrollment?');">
                                <button type="submit" class="btn btn-danger" style="padding: 6px 12px;">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(enrollments)}">
                        <td colspan="5" style="text-align: center; color: #718096;">No enrollments found.</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:if="${page > 0}" th:href="@{/ui/enrollments(page=${page - 1}, size=${size}, employeeId=${employeeIdFilter}, planId=${planIdFilter})}">← Prev</a>
                <span th:if="${page == 0}" class="disabled">← Prev</span>
                
                <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/ui/enrollments(page=${i}, size=${size}, employeeId=${employeeIdFilter}, planId=${planIdFilter})}" 
                       th:text="${i + 1}"
                       th:classappend="${i == page} ? 'current' : ''">1</a>
                </span>
                
                <a th:if="${page < totalPages - 1}" th:href="@{/ui/enrollments(page=${page + 1}, size=${size}, employeeId=${employeeIdFilter}, planId=${planIdFilter})}">Next →</a>
                <span th:if="${page >= totalPages - 1}" class="disabled">Next →</span>
            </div>
            
            <div style="margin-top: 20px; color: #718096; font-size: 14px;">
                Showing <span th:text="${#lists.size(enrollments)}">0</span> of <span th:text="${totalElements}">0</span> enrollments
            </div>
        </main>
    </div>
</body>
</html>
