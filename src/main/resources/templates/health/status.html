<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Health Status</title>
</head>
<body>
    <div th:replace="~{layout :: layout ('Health Status', ~{::main})}">
        <main>
            <h1>System Health Status</h1>
            
            <div th:class="'health-overview ' + ${healthData.status}">
                <div class="health-badge" th:classappend="${healthData.status}">
                    <span th:text="${healthData.status}">UP</span>
                </div>
                <p th:text="${healthData.description}">All systems operational</p>
            </div>
            
            <h2 style="margin-top: 30px;">Component Status</h2>
            
            <div class="components-grid">
                <div th:each="component : ${components}" class="component-card">
                    <h3 th:text="${component.key}">Component Name</h3>
                    <div class="component-status">
                        <span class="badge" 
                              th:classappend="${component.value.status == 'UP'} ? 'badge-success' : 
                                              (${component.value.status == 'DOWN'} ? 'badge-danger' : 'badge-warning')"
                              th:text="${component.value.status}">UP</span>
                    </div>
                    
                    <div th:if="${component.value.details != null}" class="component-details">
                        <ul>
                            <li th:each="detail : ${component.value.details}">
                                <strong th:text="${detail.key + ': '}">Key:</strong>
                                <span th:text="${detail.value}">Value</span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
            
            <div style="margin-top: 40px; padding: 20px; background: #f7fafc; border-radius: 12px;">
                <h3>JSON Endpoints</h3>
                <p>
                    Health data is also available via JSON endpoints:
                </p>
                <ul style="margin-left: 20px; margin-top: 10px;">
                    <li>
                        <strong>Health Summary:</strong> 
                        <a th:href="@{/actuator/health}" target="_blank" th:text="@{/actuator/health}">/actuator/health</a>
                    </li>
                    <li>
                        <strong>Application Info:</strong> 
                        <a th:href="@{/actuator/info}" target="_blank" th:text="@{/actuator/info}">/actuator/info</a>
                    </li>
                    <li>
                        <strong>Metrics:</strong> 
                        <a th:href="@{/actuator/metrics}" target="_blank" th:text="@{/actuator/metrics}">/actuator/metrics</a>
                    </li>
                </ul>
            </div>
            
            <style>
                .health-overview {
                    text-align: center;
                    padding: 40px;
                    border-radius: 12px;
                    margin-bottom: 20px;
                }
                .health-overview.UP {
                    background: linear-gradient(135deg, #c6f6d5 0%, #9ae6b4 100%);
                }
                .health-overview.DOWN {
                    background: linear-gradient(135deg, #fed7d7 0%, #fc8181 100%);
                }
                .health-overview.UNKNOWN {
                    background: linear-gradient(135deg, #fefcbf 0%, #faf089 100%);
                }
                .health-badge {
                    display: inline-block;
                    padding: 15px 40px;
                    border-radius: 30px;
                    font-size: 2rem;
                    font-weight: bold;
                    margin-bottom: 15px;
                }
                .health-badge.UP {
                    background: #48bb78;
                    color: white;
                }
                .health-badge.DOWN {
                    background: #e53e3e;
                    color: white;
                }
                .health-badge.UNKNOWN {
                    background: #d69e2e;
                    color: white;
                }
                .components-grid {
                    display: grid;
                    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                    gap: 20px;
                    margin-top: 20px;
                }
                .component-card {
                    background: #f7fafc;
                    border-radius: 12px;
                    padding: 20px;
                }
                .component-card h3 {
                    color: #4a5568;
                    margin-bottom: 10px;
                    text-transform: capitalize;
                }
                .component-status {
                    margin-bottom: 15px;
                }
                .component-details ul {
                    list-style: none;
                }
                .component-details li {
                    padding: 5px 0;
                    color: #4a5568;
                    font-size: 14px;
                }
            </style>
        </main>
    </div>
</body>
</html>
