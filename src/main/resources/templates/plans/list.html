<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Plans</title>
</head>
<body>
    <div th:replace="~{layout :: layout ('Plans', ~{::main})}">
        <main>
            <h1>Benefits Plans</h1>
            
            <div class="actions">
                <a th:href="@{/ui/plans/new}" class="btn btn-primary">+ Add Plan</a>
            </div>
            
            <form class="filters" method="get" th:action="@{/ui/plans}">
                <div class="filter-group">
                    <label>Name</label>
                    <input type="text" name="name" th:value="${nameFilter}" placeholder="Search by name...">
                </div>
                <div class="filter-group">
                    <label>Type</label>
                    <select name="type">
                        <option value="">All Types</option>
                        <option th:each="t : ${types}" th:value="${t}" th:text="${t}" th:selected="${t == typeFilter}"></option>
                    </select>
                </div>
                <div class="filter-group">
                    <button type="submit" class="btn btn-secondary">Filter</button>
                    <a th:href="@{/ui/plans}" class="btn btn-secondary">Clear</a>
                </div>
            </form>
            
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Cost</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="plan : ${plans}" th:if="${#lists.isEmpty(plans)} == false">
                        <td th:text="${plan.id}">1</td>
                        <td th:text="${plan.name}">Basic Health</td>
                        <td>
                            <span class="badge" 
                                  th:classappend="${plan.type.name() == 'HEALTH'} ? 'badge-success' : 
                                                  (${plan.type.name() == 'DENTAL'} ? 'badge-info' : 
                                                  (${plan.type.name() == 'VISION'} ? 'badge-warning' : 'badge-danger'))"
                                  th:text="${plan.type}">HEALTH</span>
                        </td>
                        <td th:text="'$' + ${#numbers.formatDecimal(plan.cost, 1, 2)}">$100.00</td>
                        <td>
                            <a th:href="@{/ui/plans/{id}/edit(id=${plan.id})}" class="btn btn-secondary" style="padding: 6px 12px;">Edit</a>
                            <form th:action="@{/ui/plans/{id}/delete(id=${plan.id})}" method="post" style="display: inline;"
                                  onsubmit="return confirm('Are you sure you want to delete this plan?');">
                                <button type="submit" class="btn btn-danger" style="padding: 6px 12px;">Delete</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(plans)}">
                        <td colspan="5" style="text-align: center; color: #718096;">No plans found.</td>
                    </tr>
                </tbody>
            </table>
            
            <div class="pagination" th:if="${totalPages > 1}">
                <a th:if="${page > 0}" th:href="@{/ui/plans(page=${page - 1}, size=${size}, type=${typeFilter}, name=${nameFilter})}">← Prev</a>
                <span th:if="${page == 0}" class="disabled">← Prev</span>
                
                <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                    <a th:href="@{/ui/plans(page=${i}, size=${size}, type=${typeFilter}, name=${nameFilter})}" 
                       th:text="${i + 1}"
                       th:classappend="${i == page} ? 'current' : ''">1</a>
                </span>
                
                <a th:if="${page < totalPages - 1}" th:href="@{/ui/plans(page=${page + 1}, size=${size}, type=${typeFilter}, name=${nameFilter})}">Next →</a>
                <span th:if="${page >= totalPages - 1}" class="disabled">Next →</span>
            </div>
            
            <div style="margin-top: 20px; color: #718096; font-size: 14px;">
                Showing <span th:text="${#lists.size(plans)}">0</span> of <span th:text="${totalElements}">0</span> plans
            </div>
        </main>
    </div>
</body>
</html>
