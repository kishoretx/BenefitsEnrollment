spring:
  application:
    name: benefits-enrollment
  datasource:
    url: jdbc:h2:mem:benefitsdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

app:
  repository:
    type: h2

springdoc:
  swagger-ui:
    path: /swagger-ui.html

# Actuator / Health Check Configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    defaults:
      enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Benefits Enrollment Service
    description: REST API and Web UI for managing employees, plans, and benefits enrollments
    version: 0.0.1-SNAPSHOT
    author: Kishore Kumar
