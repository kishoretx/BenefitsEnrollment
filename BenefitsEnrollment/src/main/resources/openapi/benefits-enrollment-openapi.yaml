openapi: 3.0.3
info:
  title: Benefits Enrollment Service API
  version: v1
  description: REST API for managing employees, plans, and enrollments with switchable repository backends.
servers:
  - url: http://localhost:8080
tags:
  - name: Employees
  - name: Plans
  - name: Enrollments
paths:
  /employees:
    get:
      tags: [Employees]
      summary: List employees with pagination and filters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/EmployeeStatus'
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated employees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEmployeeResponse'
    post:
      tags: [Employees]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmployeeRequest'
      responses:
        '201':
          description: Employee created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
  /employees/{id}:
    get:
      tags: [Employees]
      summary: Get employee by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Employee found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Employees]
      summary: Update employee
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEmployeeRequest'
      responses:
        '200':
          description: Employee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Employees]
      summary: Delete employee
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Employee deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /employees/{id}/plans:
    get:
      tags: [Employees]
      summary: Get plans for an employee
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Plans assigned to employee
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /plans:
    get:
      tags: [Plans]
      summary: List plans with pagination and filters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/PlanType'
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Paginated plans
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPlanResponse'
    post:
      tags: [Plans]
      summary: Create plan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePlanRequest'
      responses:
        '201':
          description: Plan created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
  /plans/{id}:
    get:
      tags: [Plans]
      summary: Get plan by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Plan found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Plans]
      summary: Update plan
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePlanRequest'
      responses:
        '200':
          description: Plan updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Plans]
      summary: Delete plan
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Plan deleted
        '404':
          $ref: '#/components/responses/NotFound'
  /enrollments:
    get:
      tags: [Enrollments]
      summary: List enrollments with pagination and filters
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: employeeId
          in: query
          schema:
            type: integer
            format: int64
        - name: planId
          in: query
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Paginated enrollments
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedEnrollmentResponse'
    post:
      tags: [Enrollments]
      summary: Create enrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEnrollmentRequest'
      responses:
        '201':
          description: Enrollment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    put:
      tags: [Enrollments]
      summary: Not supported on collection
      responses:
        '405':
          description: Method not allowed
  /enrollments/{id}:
    get:
      tags: [Enrollments]
      summary: Get enrollment by id
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: Enrollment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Enrollments]
      summary: Update enrollment
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEnrollmentRequest'
      responses:
        '200':
          description: Enrollment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrollmentResponse'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
    delete:
      tags: [Enrollments]
      summary: Delete enrollment
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '204':
          description: Enrollment deleted
        '404':
          $ref: '#/components/responses/NotFound'
components:
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    Page:
      name: page
      in: query
      schema:
        type: integer
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        default: 10
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    EmployeeStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    PlanType:
      type: string
      enum: [MEDICAL, DENTAL, VISION, LIFE, RETIREMENT]
    CreateEmployeeRequest:
      type: object
      required: [id, name, status]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          $ref: '#/components/schemas/EmployeeStatus'
    UpdateEmployeeRequest:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
        status:
          $ref: '#/components/schemas/EmployeeStatus'
    EmployeeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          $ref: '#/components/schemas/EmployeeStatus'
    CreatePlanRequest:
      type: object
      required: [id, name, type, cost]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          $ref: '#/components/schemas/PlanType'
        cost:
          type: number
          format: double
    UpdatePlanRequest:
      type: object
      required: [name, type, cost]
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/PlanType'
        cost:
          type: number
          format: double
    PlanResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          $ref: '#/components/schemas/PlanType'
        cost:
          type: number
          format: double
    CreateEnrollmentRequest:
      type: object
      required: [id, employeeId, planId]
      properties:
        id:
          type: integer
          format: int64
        employeeId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
    UpdateEnrollmentRequest:
      type: object
      required: [employeeId, planId]
      properties:
        employeeId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        enrollmentDate:
          type: string
          format: date
    EnrollmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeId:
          type: integer
          format: int64
        planId:
          type: integer
          format: int64
        enrollmentDate:
          type: string
          format: date
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        errorCode:
          type: string
        message:
          type: string
    PaginatedEmployeeResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EmployeeResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    PaginatedPlanResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PlanResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
    PaginatedEnrollmentResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/EnrollmentResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
